# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "357dc9e36b9244048bc2c30f30992da2"
name = "AI Image Manager"
application_url = "https://shopify-ai.deploymeta.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
scopes = "read_products,write_products,read_customers,read_files,write_files,read_app_proxy,write_app_proxy"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://shopify-ai.deploymeta.com/auth/callback" ]

[app_proxy]
url = "https://shopify-ai.deploymeta.com/api"
subpath = "ai-image"
prefix = "apps"
