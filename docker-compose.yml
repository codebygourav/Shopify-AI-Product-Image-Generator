version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopify-ai-app
    restart: always
    ports:
      - "8877:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DB:-ai_image_manager}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - IMAGE_GENERATION_MODE=${IMAGE_GENERATION_MODE:-live}
      - SHOPIFY_APP_URL=${APP_URL}
      - SCOPES=${SCOPES}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: shopify-ai-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB:-ai_image_manager}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shopify-ai-phpmyadmin
    restart: always
    ports:
      - "8880:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
