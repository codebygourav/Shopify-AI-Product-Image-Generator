version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopify-ai-app
    restart: always
    ports:
      - "8877:3000"
    volumes:
      - ./public/ai-generated:/app/public/ai-generated
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}@db:3306/${MYSQL_DB:-ai_image_manager}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-gpt-image-1.5}
      - OPENAI_MODERATION_MODEL=${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      - IMAGE_GENERATION_MODE=${IMAGE_GENERATION_MODE:-live}
      - SHOPIFY_APP_URL=${APP_URL}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-${APP_URL}}
      - SCOPES=${SCOPES}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: shopify-ai-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${MYSQL_DB:-ai_image_manager}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shopify-ai-phpmyadmin
    restart: always
    ports:
      - "8880:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
